breakpoints:
  - name: 'Medium'
    variable: '$medium'
    value: 'all and (min-width: 630px)'
    usage: "@include breakpoint('medium') { ... }"
  - name: 'Large'
    variable: '$large'
    value: 'all and (min-width: 1050px)'
    usage: "@include breakpoint('large') { ... }"
  - name: 'XLarge'
    variable: '$xlarge'
    value: 'all and (min-width: 1400px)'
    usage: "@include breakpoint('xlarge') { ... }"
