    line_height: 25px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 0
    case: original
    usage: '@include small-body(weight: bold);'
  desktop/button:
    weight: 700
    size: 14px
    font: 'Benton Sans'
    line_height: 19px
    letter_spacing: 0.7px
    text_decoration: none
    paragraph_spacing: 0
    case: original
    usage: '@include button;'
  desktop/small-text:
    weight: 500
    size: 13px
    font: 'Benton Sans'
    line_height: 21px
    letter_spacing: 0
