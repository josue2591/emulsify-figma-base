body_sample_text: 'The quick brown fox jumps over the lazy dog.'
items:
  # Desktop Body Styles
  desktop/deck-large:
    weight: 400
    size: 22px
    font: 'Benton Sans'
    line_height: 31px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 0
    case: original
    usage: '@include deck-large;'
  desktop/deck-small:
    weight: 400
    size: 18px
    font: 'Benton Sans'
    line_height: 25px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 1px
    case: original
    usage: '@include deck-small;'
  desktop/body:
    weight: 400
    size: 20px
    font: 'Benton Sans'
    line_height: 31px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 0
    case: original
    usage: '@include body;'
  desktop/body-bold:
    weight: 700
    size: 20px
    font: 'Benton Sans'
    line_height: 31px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 0
    case: original
    usage: '@include body(weight: bold);'
  desktop/highlight-text:
    weight: 500
    size: 20px
    font: 'Benton Sans'
    line_height: 31px
    letter_spacing: 0
    text_decoration: none
    paragraph_spacing: 0
    case: original
